<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🥫 Vorratskammer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0e0a04;
    background-image: radial-gradient(ellipse at 20% 0%, #1f1200 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 100%, #0a1a0a 0%, transparent 60%);
    min-height: 100vh;
    color: #f0e6c8;
    -webkit-tap-highlight-color: transparent;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0e0a04; }
  ::-webkit-scrollbar-thumb { background: #5a4a2a; border-radius: 4px; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.6); }
  select option { background: #1c1508; color: #f0e6c8; }

  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 16px 12px; border-bottom: 1px solid #2a1f0a;
    position: sticky; top: 0; background: #0e0a04; z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-left h1 { font-family: 'DM Serif Display', serif; font-size: 22px; color: #f0e6c8; line-height: 1; }
  .header-left p { font-size: 11px; color: #a0926e; }
  .header-btns { display: flex; gap: 8px; }

  #alert-bar { display: none; gap: 16px; padding: 8px 16px; background: #1a0f00; border-bottom: 1px solid #3a2500; font-size: 13px; }
  #alert-bar.visible { display: flex; }

  .search-wrap { padding: 10px 16px 6px; }
  .filter-row { display: flex; gap: 6px; padding: 6px 16px; overflow-x: auto; padding-bottom: 4px; }
  .filter-row.wrap { flex-wrap: wrap; }

  input, select {
    background: #0e0a04; border: 1px solid #3a2800; border-radius: 8px;
    padding: 10px 12px; color: #f0e6c8; font-size: 14px; outline: none;
    width: 100%; font-family: 'DM Sans', sans-serif;
  }
  input::placeholder { color: #5a4a2a; }
  label.field-label { display: block; font-size: 11px; color: #a0926e; margin-bottom: 4px; letter-spacing: 0.05em; text-transform: uppercase; }

  .btn-primary {
    background: #b45309; border: none; border-radius: 8px;
    padding: 10px 16px; color: #fff8e7; font-weight: 600; font-size: 14px;
    cursor: pointer; box-shadow: 0 2px 8px rgba(180,83,9,0.4);
    font-family: 'DM Sans', sans-serif; white-space: nowrap;
  }
  .btn-consume {
    background: #1c3a1c; border: 1px solid #166534; border-radius: 8px;
    padding: 10px 14px; color: #4ade80; font-weight: 600; font-size: 14px;
    cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap;
  }
  .btn-chip {
    background: #1c1508; border: 1px solid #3a2800; border-radius: 20px;
    padding: 5px 12px; color: #a0926e; font-size: 12px; cursor: pointer;
    white-space: nowrap; flex-shrink: 0; font-family: 'DM Sans', sans-serif;
  }
  .btn-chip.active { background: #3a2500; border-color: #b45309; color: #f0e6c8; }
  .btn-icon { background: transparent; border: none; font-size: 16px; cursor: pointer; padding: 4px 6px; opacity: 0.8; }
  .btn-minus {
    background: #1c3a1c; border: 1px solid #166534; border-radius: 6px;
    color: #4ade80; font-size: 13px; font-weight: 700; cursor: pointer;
    padding: 4px 9px; font-family: 'DM Sans', sans-serif; flex-shrink: 0;
  }
  .btn-scan { background: #1c1508; border: 1px solid #3a2800; border-radius: 8px; padding: 10px 14px; font-size: 18px; cursor: pointer; flex-shrink: 0; }
  .btn-close { background: transparent; border: none; color: #a0926e; font-size: 20px; cursor: pointer; padding: 4px 8px; }
  .btn-danger { background: #7f1d1d; border: none; border-radius: 8px; padding: 10px 18px; color: #fca5a5; font-weight: 600; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  #item-list { padding: 8px 16px 100px; display: flex; flex-direction: column; gap: 10px; }
  .item-card { border-radius: 12px; border: 1px solid; padding: 12px 14px; }
  .item-card-inner { display: flex; align-items: flex-start; gap: 10px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .item-name { font-family: 'DM Serif Display', serif; font-size: 16px; color: #f0e6c8; margin-bottom: 2px; }
  .item-meta { font-size: 12px; color: #a0926e; }
  .item-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .item-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
  .item-tags { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
  .tag { background: #0e0a04; border-radius: 4px; padding: 2px 6px; font-size: 11px; color: #a0926e; border: 1px solid #2a1f0a; }

  .empty-state { text-align: center; padding: 60px 20px; color: #a0926e; }
  .empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state h2 { font-family: 'DM Serif Display', serif; font-size: 18px; color: #f0e6c8; margin-bottom: 8px; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .overlay.hidden { display: none; }
  .modal { background: #1c1508; border: 1px solid #3a2800; border-radius: 16px; padding: 20px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: #f0e6c8; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { margin-bottom: 14px; }
  .barcode-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .barcode-row input { flex: 1; }

  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1c3a1c; border: 1px solid #166534; color: #4ade80;
    padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600;
    opacity: 0; transition: all 0.3s ease; z-index: 300; white-space: nowrap; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { background: #3f0000; border-color: #991b1b; color: #f87171; }

  #scanner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; display: flex; flex-direction: column; }
  #scanner-overlay.hidden { display: none; }
  #scanner-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px; }
  #scanner-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: #f0e6c8; display: block; }
  #scanner-mode-label { font-size: 12px; color: #4ade80; margin-top: 2px; display: block; }
  #video-wrap { position: relative; flex: 1; overflow: hidden; }
  #scanner-video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 80px; border: 2px solid rgba(250,204,21,0.9); border-radius: 8px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.5); pointer-events: none; }
  .scan-line { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: rgba(250,204,21,0.8); animation: scanline 2s linear infinite; }
  @keyframes scanline { 0% { top: 0; } 100% { top: calc(100% - 2px); } }
  #scanner-status { padding: 16px; text-align: center; color: #a0926e; font-size: 14px; }
  #scanner-manual { padding: 0 16px 24px; display: flex; gap: 8px; }
  #scanner-manual input { flex: 1; }
</style>
</head>
<body>

<!-- ── Scanner Overlay ── -->
<div id="scanner-overlay" class="hidden">
  <div id="scanner-header">
    <div>
      <span id="scanner-title">📷 Barcode scannen</span>
      <span id="scanner-mode-label"></span>
    </div>
    <button class="btn-close" onclick="closeScanner()">✕</button>
  </div>
  <div id="video-wrap">
    <video id="scanner-video" muted playsinline autoplay></video>
    <div class="scan-frame"><div class="scan-line"></div></div>
  </div>
  <div id="scanner-status">Kamera wird gestartet…</div>
  <div id="scanner-manual">
    <input type="text" id="manual-input" placeholder="Oder Barcode manuell eingeben…" inputmode="numeric">
    <button class="btn-primary" onclick="manualBarcode()">OK</button>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<!-- ── Main App ── -->
<header>
  <div class="header-left">
    <span style="font-size:26px">🥫</span>
    <div>
      <h1>Vorratskammer</h1>
      <p id="item-count">0 Produkte</p>
    </div>
  </div>
  <div class="header-btns">
    <button class="btn-consume" onclick="openConsumeScanner()">− Verbrauch</button>
    <button class="btn-primary" onclick="openAddModal()">+ Neu</button>
  </div>
</header>

<div id="alert-bar">
  <span id="alert-expired" style="color:#f87171"></span>
  <span id="alert-warn" style="color:#facc15"></span>
</div>

<div class="search-wrap">
  <input type="search" id="search-input" placeholder="🔍 Produkt suchen…" oninput="render()">
</div>

<div class="filter-row" id="status-filters">
  <button class="btn-chip active" onclick="setFilter('status','all',this)">Alle</button>
  <button class="btn-chip" onclick="setFilter('status','warn',this)">🟡 Bald ablaufend</button>
  <button class="btn-chip" onclick="setFilter('status','expired',this)">🔴 Abgelaufen</button>
</div>

<div class="filter-row wrap" id="cat-filters">
  <button class="btn-chip active" onclick="setFilter('cat','all',this)">Alle Kat.</button>
</div>

<div class="filter-row wrap" id="loc-filters">
  <button class="btn-chip active" onclick="setFilter('loc','all',this)">Alle Orte</button>
</div>

<div id="item-list"></div>

<!-- ── Add/Edit Modal ── -->
<div class="overlay hidden" id="item-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">➕ Produkt hinzufügen</span>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="barcode-row">
      <input type="text" id="f-barcode" placeholder="Barcode (optional)" inputmode="numeric" onblur="if(this.value) fetchProduct(this.value)">
      <button class="btn-scan" onclick="openAddScanner()" title="Kamera">📷</button>
    </div>
    <div id="fetch-status" style="display:none; color:#a0926e; font-size:13px; margin-bottom:10px;">⏳ Produktdaten werden geladen…</div>
    <div class="field">
      <input type="text" id="f-name" placeholder="Produktname *">
    </div>
    <div class="grid-2 field">
      <div>
        <label class="field-label">Kategorie</label>
        <select id="f-category"></select>
      </div>
      <div>
        <label class="field-label">Lagerort</label>
        <select id="f-location"></select>
      </div>
    </div>
    <div class="grid-2 field">
      <div>
        <label class="field-label">Ablaufdatum</label>
        <input type="date" id="f-expires">
      </div>
      <div>
        <label class="field-label">Menge</label>
        <input type="number" id="f-qty" value="1" min="1">
      </div>
    </div>
    <button class="btn-primary" onclick="saveItem()" style="width:100%">Speichern</button>
    <button class="btn-danger" id="delete-btn" onclick="deleteCurrentItem()" style="width:100%; margin-top:10px; display:none">🗑️ Löschen</button>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const KEY = "pantry_items_v2";
let items = [];
try { items = JSON.parse(localStorage.getItem(KEY)) || []; } catch {}

const CATEGORIES = ["🥛 Milchprodukte","🥩 Fleisch & Fisch","🥦 Gemüse & Obst","🥫 Konserven","🍞 Brot & Backwaren","🧂 Gewürze","🧃 Getränke","🍫 Süßes","🍝 Nudeln & Reis","❓ Sonstiges"];
const LOCATIONS  = ["❄️ Kühlschrank","🧊 Tiefkühler","🪣 Vorratsschrank","🗄️ Keller","🍽️ Küche offen"];
const STATUS_COLORS = {
  ok:      { dot:"#4ade80", bg:"#052e16", border:"#166534" },
  warn:    { dot:"#facc15", bg:"#1c1400", border:"#854d0e" },
  expired: { dot:"#f87171", bg:"#1f0000", border:"#991b1b" },
};

let filters = { status:"all", cat:"all", loc:"all" };
let editId = null;
let scanMode = "add";
let cameraStream = null;
let detector = null;
let scanActive = false;
let rafId = null;

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const persist = () => localStorage.setItem(KEY, JSON.stringify(items));
const todayStr = () => new Date().toISOString().split("T")[0];
const daysLeft = (exp) => exp ? Math.ceil((new Date(exp) - new Date(todayStr())) / 86400000) : null;
const statusOf = (exp) => {
  const d = daysLeft(exp);
  if (d === null) return "ok";
  if (d < 0) return "expired";
  if (d <= 7) return "warn";
  return "ok";
};

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show" + (isError ? " error" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ""; }, 2500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  const catSel = document.getElementById("f-category");
  const locSel = document.getElementById("f-location");
  CATEGORIES.forEach(c => catSel.innerHTML += "<option>" + c + "</option>");
  LOCATIONS.forEach(l => locSel.innerHTML += "<option>" + l + "</option>");

  const catF = document.getElementById("cat-filters");
  CATEGORIES.forEach(function(c) {
    const b = document.createElement("button");
    b.className = "btn-chip";
    b.textContent = c.split(" ")[0];
    b.onclick = function() { setFilter("cat", c, b); };
    catF.appendChild(b);
  });

  const locF = document.getElementById("loc-filters");
  LOCATIONS.forEach(function(l) {
    const b = document.createElement("button");
    b.className = "btn-chip";
    b.textContent = l.split(" ")[0];
    b.onclick = function() { setFilter("loc", l, b); };
    locF.appendChild(b);
  });

  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const search = document.getElementById("search-input").value.toLowerCase();
  const visible = items
    .filter(function(i) {
      if (filters.status === "warn") return statusOf(i.expires) === "warn";
      if (filters.status === "expired") return statusOf(i.expires) === "expired";
      return true;
    })
    .filter(function(i) { return filters.cat === "all" || i.category === filters.cat; })
    .filter(function(i) { return filters.loc === "all" || i.location === filters.loc; })
    .filter(function(i) { return !search || i.name.toLowerCase().includes(search); })
    .sort(function(a, b) {
      const o = { expired:0, warn:1, ok:2 };
      return (o[statusOf(a.expires)] || 3) - (o[statusOf(b.expires)] || 3);
    });

  const list = document.getElementById("item-list");
  if (visible.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="big-icon">📦</div><h2>Keine Produkte gefunden</h2><p>Füge dein erstes Produkt hinzu!</p></div>';
  } else {
    list.innerHTML = visible.map(function(item) {
      const s = statusOf(item.expires);
      const c = STATUS_COLORS[s];
      const d = daysLeft(item.expires);
      let expLabel = "";
      if (item.expires) {
        if (s === "expired") expLabel = "⚠️ vor " + Math.abs(d) + " Tagen abgelaufen";
        else if (s === "warn") expLabel = "⚠️ noch " + d + " Tag" + (d === 1 ? "" : "e");
        else expLabel = "✓ noch " + d + " Tag" + (d === 1 ? "" : "e");
      }
      return '<div class="item-card" style="background:' + c.bg + '; border-color:' + c.border + '">'
        + '<div class="item-card-inner">'
        + '<div class="status-dot" style="background:' + c.dot + '; box-shadow:0 0 6px ' + c.dot + '"></div>'
        + '<div style="flex:1; min-width:0">'
        + '<div class="item-row">'
        + '<div style="flex:1; min-width:0">'
        + '<div class="item-name">' + escHtml(item.name) + '</div>'
        + '<div class="item-meta">' + escHtml(item.category) + ' · ' + escHtml(item.location) + '</div>'
        + '</div>'
        + '<div class="item-actions">'
        + '<button class="btn-minus" onclick="consumeOne(\'' + item.id + '\')" title="Einen verbrauchen">−1</button>'
        + '<button class="btn-icon" onclick="openEditModal(\'' + item.id + '\')">✏️</button>'
        + '<button class="btn-icon" onclick="deleteItem(\'' + item.id + '\')">🗑️</button>'
        + '</div>'
        + '</div>'
        + '<div class="item-tags">'
        + (item.barcode ? '<span class="tag">#' + escHtml(item.barcode) + '</span>' : '')
        + '<span class="tag">Menge: <strong style="color:#f0e6c8">' + item.qty + '</strong></span>'
        + (expLabel ? '<span class="tag" style="color:' + c.dot + '">' + expLabel + '</span>' : '')
        + '</div>'
        + '</div></div></div>';
    }).join("");
  }

  document.getElementById("item-count").textContent = items.length + " Produkte";

  const expired = items.filter(function(i) { return statusOf(i.expires) === "expired"; }).length;
  const warn    = items.filter(function(i) { return statusOf(i.expires) === "warn"; }).length;
  const bar = document.getElementById("alert-bar");
  bar.classList.toggle("visible", expired > 0 || warn > 0);
  document.getElementById("alert-expired").textContent = expired > 0 ? "🔴 " + expired + " abgelaufen" : "";
  document.getElementById("alert-warn").textContent    = warn > 0    ? "🟡 " + warn + " laufen bald ab" : "";
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Filters ───────────────────────────────────────────────────────────────────
function setFilter(type, value, btn) {
  filters[type] = value;
  const groupId = { status:"status-filters", cat:"cat-filters", loc:"loc-filters" }[type];
  document.getElementById(groupId).querySelectorAll(".btn-chip").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  render();
}

// ── Consume (−1) ──────────────────────────────────────────────────────────────
function consumeOne(id) {
  const item = items.find(function(i) { return i.id === id; });
  if (!item) return;
  if (item.qty > 1) {
    item.qty -= 1;
    persist();
    render();
    showToast("✓ " + item.name + " – noch " + item.qty + "x");
  } else {
    if (confirm('"' + item.name + '" ist jetzt aufgebraucht. Eintrag löschen?')) {
      items = items.filter(function(i) { return i.id !== id; });
      persist();
      render();
      showToast("🗑️ " + item.name + " entfernt");
    } else {
      item.qty = 0;
      persist();
      render();
      showToast('"' + item.name + '" auf 0 gesetzt');
    }
  }
}

// ── Consume via Scanner ───────────────────────────────────────────────────────
function openConsumeScanner() {
  scanMode = "consume";
  document.getElementById("scanner-title").textContent = "📷 Verbrauch scannen";
  document.getElementById("scanner-mode-label").textContent = "Bestand wird um 1 reduziert";
  openScanner();
}

function openAddScanner() {
  scanMode = "add";
  document.getElementById("scanner-title").textContent = "📷 Barcode scannen";
  document.getElementById("scanner-mode-label").textContent = "";
  openScanner();
}

function handleScannedCode(code) {
  if (scanMode === "consume") {
    const item = items.find(function(i) { return i.barcode === code; });
    if (item) {
      consumeOne(item.id);
    } else {
      showToast("⚠️ Produkt nicht im Bestand gefunden", true);
    }
  } else {
    document.getElementById("f-barcode").value = code;
    fetchProduct(code);
  }
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openAddModal() {
  editId = null;
  document.getElementById("modal-title").textContent = "➕ Produkt hinzufügen";
  document.getElementById("f-barcode").value = "";
  document.getElementById("f-name").value = "";
  document.getElementById("f-category").value = CATEGORIES[9];
  document.getElementById("f-location").value = LOCATIONS[0];
  document.getElementById("f-expires").value = "";
  document.getElementById("f-qty").value = 1;
  document.getElementById("delete-btn").style.display = "none";
  document.getElementById("item-modal").classList.remove("hidden");
}

function openEditModal(id) {
  const item = items.find(function(i) { return i.id === id; });
  if (!item) return;
  editId = id;
  document.getElementById("modal-title").textContent = "✏️ Bearbeiten";
  document.getElementById("f-barcode").value = item.barcode || "";
  document.getElementById("f-name").value = item.name;
  document.getElementById("f-category").value = item.category;
  document.getElementById("f-location").value = item.location;
  document.getElementById("f-expires").value = item.expires || "";
  document.getElementById("f-qty").value = item.qty || 1;
  document.getElementById("delete-btn").style.display = "block";
  document.getElementById("item-modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("item-modal").classList.add("hidden");
}

function saveItem() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { document.getElementById("f-name").focus(); return; }
  const item = {
    id: editId || uid(),
    name: name,
    barcode: document.getElementById("f-barcode").value.trim(),
    category: document.getElementById("f-category").value,
    location: document.getElementById("f-location").value,
    expires: document.getElementById("f-expires").value,
    qty: parseInt(document.getElementById("f-qty").value) || 1,
  };
  if (editId) {
    const idx = items.findIndex(function(i) { return i.id === editId; });
    if (idx >= 0) items[idx] = item;
  } else {
    items.unshift(item);
  }
  persist();
  closeModal();
  render();
  showToast("✓ " + item.name + " gespeichert");
}

function deleteItem(id) {
  const item = items.find(function(i) { return i.id === id; });
  if (!item || !confirm('"' + item.name + '" löschen?')) return;
  items = items.filter(function(i) { return i.id !== id; });
  persist();
  render();
  showToast("🗑️ " + item.name + " entfernt");
}

function deleteCurrentItem() {
  if (!editId) return;
  closeModal();
  deleteItem(editId);
}

// ── OpenFoodFacts ─────────────────────────────────────────────────────────────
function fetchProduct(code) {
  const statusEl = document.getElementById("fetch-status");
  statusEl.style.display = "block";
  fetch("https://world.openfoodfacts.org/api/v0/product/" + code + ".json")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.status === 1) {
        const p = d.product;
        document.getElementById("f-name").value = p.product_name || p.product_name_de || "";
        document.getElementById("f-barcode").value = code;
        if (p.categories_tags) {
          const cats = p.categories_tags.join(" ").toLowerCase();
          let cat = CATEGORIES[9];
          if (cats.includes("milk")||cats.includes("milch")||cats.includes("dairy")||cats.includes("cheese")) cat = CATEGORIES[0];
          else if (cats.includes("meat")||cats.includes("fish")||cats.includes("fleisch")) cat = CATEGORIES[1];
          else if (cats.includes("vegetable")||cats.includes("fruit")||cats.includes("gemüse")) cat = CATEGORIES[2];
          else if (cats.includes("conserve")||cats.includes("canned")) cat = CATEGORIES[3];
          else if (cats.includes("bread")||cats.includes("brot")||cats.includes("bakery")) cat = CATEGORIES[4];
          else if (cats.includes("beverage")||cats.includes("drink")||cats.includes("getränk")) cat = CATEGORIES[6];
          else if (cats.includes("sweet")||cats.includes("chocolate")) cat = CATEGORIES[7];
          else if (cats.includes("pasta")||cats.includes("nudel")||cats.includes("rice")) cat = CATEGORIES[8];
          document.getElementById("f-category").value = cat;
        }
      } else {
        document.getElementById("f-barcode").value = code;
      }
      statusEl.style.display = "none";
    })
    .catch(function() { statusEl.style.display = "none"; });
}

// ── Scanner ───────────────────────────────────────────────────────────────────
function openScanner() {
  document.getElementById("scanner-overlay").classList.remove("hidden");
  document.getElementById("manual-input").value = "";
  startCamera();
}

function closeScanner() {
  scanActive = false;
  cancelAnimationFrame(rafId);
  if (cameraStream) { cameraStream.getTracks().forEach(function(t) { t.stop(); }); cameraStream = null; }
  document.getElementById("scanner-overlay").classList.add("hidden");
}

function startCamera() {
  const statusEl = document.getElementById("scanner-status");
  statusEl.textContent = "Kamera wird gestartet…";

  if (!("BarcodeDetector" in window)) {
    statusEl.textContent = "⚠️ Kein integrierter Scanner verfügbar. Bitte Barcode unten manuell eingeben.";
    return;
  }

  try {
    detector = new BarcodeDetector({
      formats: ["ean_13","ean_8","upc_a","upc_e","code_128","code_39","qr_code"]
    });
  } catch(e) {
    statusEl.textContent = "⚠️ Scanner konnte nicht initialisiert werden. Bitte manuell eingeben.";
    return;
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
  }).then(function(stream) {
    cameraStream = stream;
    const videoEl = document.getElementById("scanner-video");
    videoEl.srcObject = stream;
    videoEl.play().then(function() {
      statusEl.textContent = "Barcode auf die Kamera halten…";
      scanActive = true;
      scanLoop(videoEl);
    });
  }).catch(function() {
    statusEl.textContent = "❌ Kamerazugriff verweigert. Bitte in den Chrome-Einstellungen erlauben oder Barcode manuell eingeben.";
  });
}

function scanLoop(videoEl) {
  if (!scanActive || !detector) return;
  detector.detect(videoEl).then(function(codes) {
    if (!scanActive) return;
    if (codes.length > 0) {
      closeScanner();
      handleScannedCode(codes[0].rawValue);
    } else {
      rafId = requestAnimationFrame(function() { scanLoop(videoEl); });
    }
  }).catch(function() {
    rafId = requestAnimationFrame(function() { scanLoop(videoEl); });
  });
}

function manualBarcode() {
  const val = document.getElementById("manual-input").value.trim();
  if (!val) return;
  closeScanner();
  handleScannedCode(val);
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
